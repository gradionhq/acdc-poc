name: Feature request
description: Suggest a new feature or enhancement.
labels: ['type:feature']
body:
  - type: markdown
    attributes:
      value: |
        Please search existing issues and discussions before opening a feature request.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: Is your feature request related to a problem? Describe it clearly.
      placeholder: I'm always frustrated when...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: A clear and concise description of what you want to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've considered and why this one is preferred.
    validations:
      required: false
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How will we know when this feature is done? List testable criteria.
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Mockups, links, or other context to help understand the request.
    validations:
      required: false
